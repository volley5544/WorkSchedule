name: Deploy to Firebase Hosting

# Builds the Flutter web app and deploys it to Firebase Hosting on every push
# to main. Mirrors the local release flow: analyze + test as gates, then a
# release build with --pwa-strategy=none (the Flutter service worker is
# disabled so new deploys are visible on first load — hosting cache headers in
# firebase.json handle caching instead).

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: read

concurrency:
  # Never run two deploys at once; cancel an in-progress one if a newer push
  # lands.
  group: firebase-hosting
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.5
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Test
        run: flutter test

      - name: Build web
        run: flutter build web --release --pwa-strategy=none

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: pharmacist-schedule
          channelId: live
